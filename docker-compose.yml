
services:
  db:
    image: mysql:8.0
    container_name: clube-leitura-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clube_leitura
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./leitura-backend/src/main/resources/db/migration/V1__create_tables.sql:/docker-entrypoint-initdb.d/01-create-tables.sql
      - ./leitura-backend/src/main/resources/db/migration/V2__seed_data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./leitura-backend
      dockerfile: Dockerfile
    container_name: clube-leitura-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/clube_leitura?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Fortaleza
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_JWT_SECRET: clube-leitura-secret-key-2026-deve-ter-ao-menos-256-bits-de-comprimento
      APP_JWT_EXPIRATION_MS: 86400000
      APP_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
