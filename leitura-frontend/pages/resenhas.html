<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resenhas — Clube de Leitura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components/navbar.css">
  <link rel="stylesheet" href="../assets/css/components/form.css">
  <link rel="stylesheet" href="../assets/css/components/toast.css">
  <link rel="stylesheet" href="../assets/css/pages/resenhas.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <header id="topbar" class="topbar"></header>

  <main class="container">
    <section class="resenhas-hero">
      <div class="resenhas-hero-bg"></div>
      <div class="resenhas-hero-content">
        <div class="resenhas-hero-text">
          <p class="resenhas-hero-greeting">Minhas Resenhas</p>
          <h1 class="resenhas-hero-name" id="heroName">Carregando...</h1>
          <p class="resenhas-hero-subtitle">Compartilhe sua opinião sobre os livros que leu</p>
        </div>
        <div class="resenhas-hero-stats" id="heroStats">
          <div class="hero-stat">
            <span class="hero-stat-value" id="heroTotalResenhas">0</span>
            <span class="hero-stat-label">Resenhas</span>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <span class="hero-stat-value" id="heroAvgRating">—</span>
            <span class="hero-stat-label">Média</span>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <span class="hero-stat-value" id="heroTotalReacoes">0</span>
            <span class="hero-stat-label">Reações</span>
          </div>
        </div>
      </div>
    </section>

    <div class="resenhas-controls">
      <div class="review-search-wrap">
        <svg class="review-search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" class="review-search-input" placeholder="Buscar por livro, autor, gênero ou texto...">
      </div>
      <select id="genreFilter" class="review-stars-filter">
        <option value="">Todos os gêneros</option>
      </select>
      <select id="starsFilter" class="review-stars-filter">
        <option value="">Todas as notas</option>
        <option value="5">5 estrelas</option>
        <option value="4">4 estrelas</option>
        <option value="3">3 estrelas</option>
        <option value="2">2 estrelas</option>
        <option value="1">1 estrela</option>
      </select>
      <select id="dateFilter" class="review-stars-filter">
        <option value="">Todo o período</option>
        <option value="7">Últimos 7 dias</option>
        <option value="30">Último mês</option>
        <option value="90">Últimos 3 meses</option>
        <option value="365">Último ano</option>
      </select>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Carregando resenhas...</p>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <svg class="empty-icon" width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <h3 class="empty-title" id="emptyTitle">Nenhuma resenha encontrada</h3>
      <p class="empty-text" id="emptyMessage">Nenhuma resenha corresponde aos filtros selecionados.</p>
      <a href="biblioteca.html" class="btn btn-primary" style="margin-top:var(--spacing-lg)" id="emptyCta">Explorar Biblioteca</a>
    </div>

    <div id="reviewsGrid" class="reviews-grid"></div>
  </main>

  <script src="../assets/js/utils/constants.js"></script>
  <script src="../assets/js/utils/auth.utils.js"></script>
  <script src="../assets/js/utils/format.utils.js"></script>
  <script src="../assets/js/api/http.js"></script>
  <script src="../assets/js/api/livros.api.js"></script>
  <script src="../assets/js/api/leitura.api.js"></script>
  <script src="../assets/js/api/resenha.api.js"></script>
  <script src="../assets/js/components/avatar.js"></script>
  <script src="../assets/js/components/navbar.js"></script>
  <script src="../assets/js/components/modal.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/pages/resenhas.js"></script>
</body>
</html>
