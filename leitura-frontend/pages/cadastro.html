<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Clube de Leitura</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components/form.css">
  <link rel="stylesheet" href="../assets/css/pages/auth.css">
  <link rel="stylesheet" href="../assets/css/components/avatar.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="../assets/img/logo.svg" alt="Alexandria" style="width:48px;margin:0 auto 8px;">
        <h1><span>Alexandria</span></h1>
        <p>Crie sua conta</p>
      </div>

      <div id="cadastroError" class="auth-error hidden"></div>

      <form id="cadastroForm">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Seu nome completo" required minlength="2" autofocus>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Mínimo 8 caracteres" required minlength="8">
        </div>

        <div class="form-group">
          <label for="confirmSenha">Confirmar Senha</label>
          <input type="password" id="confirmSenha" placeholder="Repita a senha" required minlength="8">
        </div>

        <div class="form-group">
          <label>Personalize seu Avatar</label>
          <div id="avatarBuilder"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
      </form>

      <div class="auth-link">
        Já tem conta? <a href="../index.html">Faça login</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/utils/constants.js"></script>
  <script src="../assets/js/utils/auth.utils.js"></script>
  <script src="../assets/js/utils/format.utils.js"></script>
  <script src="../assets/js/api/http.js"></script>
  <script src="../assets/js/api/auth.api.js"></script>
  <script src="../assets/js/components/avatar.js"></script>
  <script src="../assets/js/pages/cadastro.js"></script>
</body>
</html>
