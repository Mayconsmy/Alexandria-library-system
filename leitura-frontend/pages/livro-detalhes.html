<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livro — Clube de Leitura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components/navbar.css">
  <link rel="stylesheet" href="../assets/css/components/form.css">
  <link rel="stylesheet" href="../assets/css/components/toast.css">
  <link rel="stylesheet" href="../assets/css/pages/livro-detalhes.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <header id="topbar" class="topbar"></header>

  <main class="container">
    <a href="biblioteca.html" class="back-link">&larr; Voltar para Biblioteca</a>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Carregando livro...</p>
    </div>

    <div id="bookDetail" class="book-detail hidden">
      <div class="book-info">
        <div class="book-cover">
          <img src="../assets/img/placeholder-book.svg" alt="" id="bookCover" onerror="this.src='../assets/img/placeholder-book.svg'">
        </div>
        <div class="book-meta">
          <h2 id="bookTitle"></h2>
          <p class="book-author" id="bookAuthor"></p>
          <p class="book-genre" id="bookGenre"></p>
          <p class="book-year" id="bookYear"></p>
          <p class="book-description" id="bookDescription"></p>
          <div class="book-actions">
            <div class="status-buttons">
              <button class="btn btn-sm btn-status" data-status="quero_ler">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                Quero Ler
              </button>
              <button class="btn btn-sm btn-status btn-primary" data-status="lendo">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Lendo
              </button>
              <button class="btn btn-sm btn-status btn-success" data-status="lido">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Lido
              </button>
              <button class="btn btn-sm btn-status" data-status="abandonado">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>
                Abandonar
              </button>
              <button class="btn btn-sm btn-status" data-status="relendo">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Relendo
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="book-rating" id="bookRating">
        <h3 class="section-title">Avaliação Média</h3>
        <div class="stars-svg" id="avgStars"></div>
        <span id="avgRatingText"></span>
      </div>

      <div class="reviews-section">
        <h3 class="section-title">Resenhas</h3>
        <div id="reviewsList"></div>
        <div class="review-form">
          <h4>Escreva uma resenha</h4>
          <textarea id="reviewText" placeholder="Compartilhe sua opinião sobre este livro..." rows="4"></textarea>
          <div class="review-form-footer">
            <input type="number" id="reviewNota" placeholder="Nota (1-5)" min="1" max="5" step="0.5">
            <button class="btn btn-primary" id="submitReviewBtn">Publicar</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/utils/constants.js"></script>
  <script src="../assets/js/utils/auth.utils.js"></script>
  <script src="../assets/js/utils/format.utils.js"></script>
  <script src="../assets/js/api/http.js"></script>
  <script src="../assets/js/api/livros.api.js"></script>
  <script src="../assets/js/api/leitura.api.js"></script>
  <script src="../assets/js/components/avatar.js"></script>
  <script src="../assets/js/components/navbar.js"></script>
  <script src="../assets/js/components/modal.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/pages/livro-detalhes.js"></script>
</body>
</html>
