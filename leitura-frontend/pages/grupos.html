<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos — Clube de Leitura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components/navbar.css">
  <link rel="stylesheet" href="../assets/css/components/form.css">
  <link rel="stylesheet" href="../assets/css/components/modal.css">
  <link rel="stylesheet" href="../assets/css/components/toast.css">
  <link rel="stylesheet" href="../assets/css/pages/biblioteca.css">
  <link rel="stylesheet" href="../assets/css/pages/grupos.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <header id="topbar" class="topbar"></header>

  <main class="container">
    <div class="grupos-header">
      <div class="grupos-header-top">
        <div>
          <h1>Grupos de Leitura</h1>
          <p class="subtitle">Conecte-se com outros leitores</p>
        </div>
        <button class="btn btn-primary" id="createGroupBtn">+ Criar Grupo</button>
      </div>
      <div class="search-bar">
        <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar grupos...">
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Carregando grupos...</p>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <svg class="empty-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <h3 class="empty-title">Nenhum grupo encontrado</h3>
      <p class="empty-text" id="emptyMessage">Nenhum grupo corresponde à sua busca. Crie um novo grupo!</p>
    </div>

    <div id="groupGrid" class="group-grid"></div>
  </main>

  <script src="../assets/js/utils/constants.js"></script>
  <script src="../assets/js/utils/auth.utils.js"></script>
  <script src="../assets/js/utils/format.utils.js"></script>
  <script src="../assets/js/api/http.js"></script>
  <script src="../assets/js/api/grupos.api.js"></script>
  <script src="../assets/js/components/avatar.js"></script>
  <script src="../assets/js/components/navbar.js"></script>
  <script src="../assets/js/components/modal.js"></script>
  <script src="../assets/js/components/toast.js"></script>
  <script src="../assets/js/pages/grupos.js"></script>
</body>
</html>
