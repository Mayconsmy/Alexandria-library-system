<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');</script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:3000 http://localhost:8080">
  <title>Login — Clube de Leitura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/components/form.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/img/logo.svg" alt="Alexandria" style="width:48px;margin:0 auto 8px;">
        <h1><span>Alexandria</span></h1>
        <p>Clube de Leitura</p>
      </div>

      <div id="loginError" class="auth-error hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required autofocus>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Sua senha" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <div class="auth-link">
        Ainda não tem conta? <a href="pages/cadastro.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script src="assets/js/utils/constants.js"></script>
  <script src="assets/js/utils/auth.utils.js"></script>
  <script src="assets/js/utils/format.utils.js"></script>
  <script src="assets/js/api/http.js"></script>
  <script src="assets/js/api/auth.api.js"></script>
  <script src="assets/js/pages/login.js"></script>
</body>
</html>
