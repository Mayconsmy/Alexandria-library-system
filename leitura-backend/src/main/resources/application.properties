# ============================================================
# Sistema de Clubes de Leitura — Configurações
# ============================================================

spring.application.name=clube-leitura

# ------------------------------------------------------------
# Banco de Dados MySQL
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/clube_leitura?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Fortaleza&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ------------------------------------------------------------
# JWT
# ------------------------------------------------------------
# Troque o valor abaixo por uma string secreta longa e aleatória em produção
app.jwt.secret=clube-leitura-secret-key-2026-deve-ter-ao-menos-256-bits-de-comprimento
app.jwt.expiration-ms=86400000

# ------------------------------------------------------------
# Servidor
# ------------------------------------------------------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ------------------------------------------------------------
# Encoding
# ------------------------------------------------------------
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ------------------------------------------------------------
# CORS — permite chamadas do frontend local
# ------------------------------------------------------------
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500
